name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  validate-self-building-recipe:
    name: Validate Self-Building Recipe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Build recipe runner
        run: cargo build --release

      - name: Validate self-building recipe parses correctly
        run: ./target/release/recipe-runner-rs recipes/build-recipe-runner.yaml --validate-only

      - name: Verify recipe structure
        run: ./target/release/recipe-runner-rs recipes/build-recipe-runner.yaml --explain

      - name: Dry-run self-building recipe
        run: ./target/release/recipe-runner-rs recipes/build-recipe-runner.yaml --dry-run

      - name: Check recipe covers all source modules
        run: |
          # Every src/*.rs file should be referenced in the recipe
          missing=0
          for mod in models parser context condition runner agent_resolver discovery lib main adapters cli_subprocess; do
            if ! grep -q "$mod" recipes/build-recipe-runner.yaml; then
              echo "ERROR: recipes/build-recipe-runner.yaml missing reference to $mod"
              missing=1
            fi
          done
          # Submodules extracted from runner.rs
          for mod in listeners json_parser audit; do
            if ! grep -q "$mod" recipes/build-recipe-runner.yaml; then
              echo "WARNING: recipes/build-recipe-runner.yaml missing reference to submodule $mod"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Self-building recipe is out of sync with source modules"
            exit 1
          fi
          echo "All source modules referenced in self-building recipe ✓"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet
      - name: Run security audit
        run: cargo audit

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --quiet

      - name: Run coverage
        run: cargo tarpaulin --all-targets --out stdout --skip-clean 2>&1 | tee coverage.txt

      - name: Check coverage threshold
        run: |
          # Extract coverage percentage
          coverage=$(grep -oP '\d+\.\d+%' coverage.txt | tail -1 | tr -d '%')
          echo "Coverage: ${coverage}%"
          # Fail if below 60% (generous threshold to start)
          if [ "$(echo "$coverage < 60" | bc)" -eq 1 ]; then
            echo "ERROR: Coverage ${coverage}% is below 60% threshold"
            exit 1
          fi
          echo "Coverage ${coverage}% meets threshold ✓"
