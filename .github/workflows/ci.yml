name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Least-privilege default for GITHUB_TOKEN. Every job here only needs to read
# the repository contents; no job pushes commits, comments, or releases.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry & build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --all-targets

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  validate-self-building-recipe:
    name: Validate Self-Building Recipe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Build recipe runner
        run: cargo build --release

      - name: Validate self-building recipe parses correctly
        run: ./target/release/recipe-runner-rs recipes/build-recipe-runner.yaml --validate-only

      - name: Verify recipe structure
        run: ./target/release/recipe-runner-rs recipes/build-recipe-runner.yaml --explain

      - name: Dry-run self-building recipe
        run: ./target/release/recipe-runner-rs recipes/build-recipe-runner.yaml --dry-run

      - name: Check recipe covers all source modules
        run: |
          # Every src/*.rs file should be referenced in the recipe
          missing=0
          for mod in models parser context condition runner agent_resolver discovery lib main adapters cli_subprocess; do
            if ! grep -q "$mod" recipes/build-recipe-runner.yaml; then
              echo "ERROR: recipes/build-recipe-runner.yaml missing reference to $mod"
              missing=1
            fi
          done
          # Submodules extracted from runner.rs
          for mod in listeners json_parser audit; do
            if ! grep -q "$mod" recipes/build-recipe-runner.yaml; then
              echo "WARNING: recipes/build-recipe-runner.yaml missing reference to submodule $mod"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Self-building recipe is out of sync with source modules"
            exit 1
          fi
          echo "All source modules referenced in self-building recipe ✓"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Run security audit (RustSec advisory DB)
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked
      - name: Run cargo-deny (advisories, bans, licenses, sources)
        run: cargo deny check

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version 0.36.0 --locked

      - name: Run coverage
        run: cargo tarpaulin --all-targets --out stdout --skip-clean 2>&1 | tee coverage.txt

      - name: Check coverage threshold
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("coverage.txt").read_text()
          match = re.search(r"(\d+\.\d+)% coverage,", text)
          if not match:
              raise SystemExit("ERROR: Could not parse overall coverage from coverage.txt")

          coverage = float(match.group(1))
          print(f"Coverage: {coverage:.2f}%")

          if coverage < 60.0:
              raise SystemExit(f"ERROR: Coverage {coverage:.2f}% is below 60% threshold")

          print(f"Coverage {coverage:.2f}% meets threshold ✓")
          PY
