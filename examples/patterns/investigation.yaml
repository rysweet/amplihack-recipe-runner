# Investigation Workflow Pattern
#
# Demonstrates the structured investigation pattern: scope → explore → analyze
# → synthesize → document. Combines bash exploration (find, grep) with agent
# analysis to answer questions about a codebase or system.

name: "investigation"
description: |
  Structured investigation workflow that explores a codebase to answer a
  specific question. Uses bash for file discovery and pattern matching,
  then agents for analysis and synthesis. Findings are documented to a file.
version: "1.0.0"
author: "amplihack"
tags: ["investigation", "research", "exploration", "pattern"]

context:
  question: "How is authentication implemented in this codebase?"
  repo_path: "."
  output_file: "investigation-report.md"
  max_depth: 5

steps:
  # Phase 1: Agent defines investigation scope and search strategy
  - id: "define-scope"
    type: "agent"
    prompt: |
      Define an investigation scope for the following question about the
      codebase at {{repo_path}}:

      Question: {{question}}

      Return a JSON object with:
      - "keywords": array of search terms to grep for
      - "file_patterns": array of glob patterns for relevant files (e.g., "*.py", "*.ts")
      - "directories": array of likely directories to focus on
      - "aspects": array of specific aspects to investigate
    output: "scope"
    parse_json: true

  # Phase 2: Bash exploration — gather raw data
  - id: "find-relevant-files"
    type: "bash"
    working_dir: "{{repo_path}}"
    command: |
      echo "=== File Structure ==="
      find . -maxdepth {{max_depth}} -type f \
        \( -name "*.py" -o -name "*.ts" -o -name "*.js" -o -name "*.rs" -o -name "*.go" \) \
        ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/target/*" \
        | head -200
    output: "file_listing"

  - id: "grep-for-patterns"
    type: "bash"
    working_dir: "{{repo_path}}"
    command: |
      echo "=== Pattern Matches ==="
      grep -rn --include="*.py" --include="*.ts" --include="*.js" --include="*.rs" --include="*.go" \
        -i -E "auth|login|token|session|jwt|oauth|credential|password" \
        . 2>/dev/null | head -100 || echo "No matches found"
    output: "grep_results"
    continue_on_error: true

  - id: "gather-structure"
    type: "bash"
    working_dir: "{{repo_path}}"
    command: |
      echo "=== Directory Structure ==="
      find . -maxdepth 3 -type d ! -path "*/node_modules/*" ! -path "*/.git/*" ! -path "*/target/*" | sort
      echo ""
      echo "=== Config Files ==="
      find . -maxdepth 2 -type f \( -name "*.toml" -o -name "*.yaml" -o -name "*.yml" -o -name "*.json" -o -name "*.cfg" \) \
        ! -path "*/node_modules/*" ! -path "*/.git/*" | sort
    output: "structure_info"

  # Phase 3: Agent analysis of findings
  - id: "analyze-findings"
    type: "agent"
    prompt: |
      Analyze the following exploration results to answer: {{question}}

      Investigation scope: {{scope}}

      File listing:
      {{file_listing}}

      Pattern matches:
      {{grep_results}}

      Project structure:
      {{structure_info}}

      Provide a detailed analysis covering:
      1. Key files and modules related to the question
      2. Patterns and architecture observed
      3. Dependencies and relationships between components
      4. Any gaps or areas needing deeper investigation
    output: "analysis"

  # Phase 4: Agent synthesizes conclusions
  - id: "synthesize-conclusions"
    type: "agent"
    prompt: |
      Synthesize the investigation into clear conclusions.

      Original question: {{question}}
      Analysis: {{analysis}}

      Return a JSON object with:
      - "answer": concise answer to the question (2-3 paragraphs)
      - "key_files": array of the most important files discovered
      - "architecture": description of the relevant architecture
      - "recommendations": array of actionable recommendations
      - "confidence": "high", "medium", or "low"
    output: "conclusions"
    parse_json: true

  # Phase 5: Document findings to file
  - id: "write-report"
    type: "bash"
    command: |
      cat > "{{output_file}}" << 'REPORT_EOF'
      # Investigation Report

      ## Question
      {{question}}

      ## Conclusions
      {{conclusions}}

      ## Detailed Analysis
      {{analysis}}

      ## Files Examined
      {{file_listing}}

      ---
      Generated by amplihack investigation workflow
      REPORT_EOF
      echo "Report written to {{output_file}}"
    output: "report_path"
